name: Autograding Tests

on:
  - push
  - repository_dispatch

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Case 01 - n sama dengan 1
        id: case-01
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 01 - n sama dengan 1
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "1"
          expected-output: |-
            ()
            TOTAL 1
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 02 - n sama dengan 2
        id: case-02
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 02 - n sama dengan 2
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "2"
          expected-output: |-
            (())
            ()()
            TOTAL 2
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 03 - contoh resmi n sama dengan 3
        id: case-03
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 03 - contoh resmi n sama dengan 3
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "3"
          expected-output: |-
            ((()))
            (()())
            (())()
            ()(())
            ()()()
            TOTAL 5
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 04 - n sama dengan 0
        id: case-04
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 04 - n sama dengan 0
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "0"
          expected-output: |-
            TOTAL 1
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 05 - n sama dengan 4
        id: case-05
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 05 - n sama dengan 4
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "4"
          expected-output: |-
            (((())))
            ((()()))
            ((())())
            ((()))()
            (()(()))
            (()()())
            (()())()
            (())(())
            (())()()
            ()((()))
            ()(()())
            ()(())()
            ()()(())
            ()()()()
            TOTAL 14
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 06 - cek urutan leksikografis n sama dengan 2
        id: case-06
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 06 - cek urutan leksikografis n sama dengan 2
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "2"
          expected-output: |-
            (())
            ()()
            TOTAL 2
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 07 - cek total n sama dengan 1
        id: case-07
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 07 - cek total n sama dengan 1
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "1"
          expected-output: |-
            ()
            TOTAL 1
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 08 - cek total n sama dengan 3
        id: case-08
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 08 - cek total n sama dengan 3
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "3"
          expected-output: |-
            ((()))
            (()())
            (())()
            ()(())
            ()()()
            TOTAL 5
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 09 - cek bentuk minimum n sama dengan 1
        id: case-09
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 09 - cek bentuk minimum n sama dengan 1
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "1"
          expected-output: |-
            ()
            TOTAL 1
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Case 10 - cek bentuk kompleks n sama dengan 4
        id: case-10
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 10 - cek bentuk kompleks n sama dengan 4
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal1 soal1.c
          command: ./soal1
          input: "4"
          expected-output: |-
            (((())))
            ((()()))
            ((())())
            ((()))()
            (()(()))
            (()()())
            (()())()
            (())(())
            (())()()
            ()((()))
            ()(()())
            ()(())()
            ()()(())
            ()()()()
            TOTAL 14
          comparison-method: exact
          timeout: 2
          max-score: 10

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          CASE-01_RESULTS: "${{steps.case-01.outputs.result}}"
          CASE-02_RESULTS: "${{steps.case-02.outputs.result}}"
          CASE-03_RESULTS: "${{steps.case-03.outputs.result}}"
          CASE-04_RESULTS: "${{steps.case-04.outputs.result}}"
          CASE-05_RESULTS: "${{steps.case-05.outputs.result}}"
          CASE-06_RESULTS: "${{steps.case-06.outputs.result}}"
          CASE-07_RESULTS: "${{steps.case-07.outputs.result}}"
          CASE-08_RESULTS: "${{steps.case-08.outputs.result}}"
          CASE-09_RESULTS: "${{steps.case-09.outputs.result}}"
          CASE-10_RESULTS: "${{steps.case-10.outputs.result}}"
        with:
          runners: case-01,case-02,case-03,case-04,case-05,case-06,case-07,case-08,case-09,case-10
